<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - SantiagoRivers</title>
    <!-- CDN de Tailwind CSS -->
    <script src="https://jsdelivr.net"></script>
    <!-- Iconos de Boxicons -->
    <link href="https://unpkg.com" rel="stylesheet">
    <style>
        /* Fondo con degradado similar al de la imagen */
        body {
            background: radial-gradient(circle at top right, #2d124d, #0c1020);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center text-white m-0 overflow-hidden font-sans">

    <!-- Tarjeta Central -->
    <div class="bg-neutral-800/60 border border-neutral-700 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4 text-center max-w-md mx-4">
        <p class="text-3xl font-bold flex items-center justify-center gap-2">
            Hola, soy 
            <span class="bg-green-600 text-2xl px-3 py-1 rounded-xl flex items-center gap-2">
                🌊 SantiagoRivers
            </span>
        </p>
        <p class="text-2xl">
            Me suelen llamar 
            <span class="bg-purple-600 font-semibold px-3 py-1 rounded-xl">Santiago</span>.
        </p>
        <p class="text-2xl">
            Soy 
            <span class="bg-amber-600 font-semibold px-3 py-1 rounded-xl">programador fullstack</span>.
        </p>
        <p class="text-2xl">
            Revisa 
            <a href="#" class="bg-red-500 font-semibold px-3 py-1 rounded-xl hover:scale-105 transition-transform inline-block">Sobre mí</a>.
        </p>
    </div>

    <!-- Barra de Navegación Flotante Inferior -->
    <div class="fixed bottom-6 z-10 flex justify-center w-full">
        <nav class="bg-[#201e20]/40 border border-neutral-700/60 p-2.5 rounded-3xl flex flex-row gap-2 items-center justify-center shadow-2xl">
            
            <!-- Botón Inicio (Activo) -->
            <a href="#" class="text-2xl p-2.5 border border-neutral-600/50 rounded-xl bg-blue-700 hover:scale-105 transition-transform flex items-center justify-center">
                <i class='bx bxs-home'></i>
            </a>
            
            <!-- Botón Proyectos -->
            <a href="#" class="text-2xl p-2.5 border border-neutral-600/50 rounded-xl hover:bg-neutral-700/50 hover:scale-105 transition-transform flex items-center justify-center">
                <i class='bx bxs-grid-alt'></i>
            </a>
            
            <!-- Botón Sobre mí -->
            <a href="#" class="text-2xl p-2.5 border border-neutral-600/50 rounded-xl hover:bg-neutral-700/50 hover:scale-105 transition-transform flex items-center justify-center">
                <i class='bx bxs-user'></i>
            </a>
            
            <!-- Separador -->
            <div class="w-[2px] h-5 bg-neutral-600 rounded-full mx-1"></div>
            
            <!-- Botón Correo -->
            <a href="mailto:tu-correo@ejemplo.com" class="text-2xl p-2.5 border border-neutral-600/50 rounded-xl hover:bg-neutral-700/50 hover:scale-105 transition-transform flex items-center justify-center">
                <i class='bx bxs-envelope'></i>
            </a>
            
            <!-- Botón X (Twitter) -->
            <a href="#" target="_blank" class="text-2xl p-2.5 border border-neutral-600/50 rounded-xl hover:bg-neutral-700/50 hover:scale-105 transition-transform flex items-center justify-center">
                <i class='bx bxl-twitter'></i>
            </a>
            
        </nav>
    </div>

</body>
</html>
