<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Proyectos - SantiagoRivers</title>
    <style>
        /* === ESTILOS CSS CON ANIMACIÓN DE FONDO ROJO === */
        @keyframes cambiarFondoRojo {
            0% { background: radial-gradient(circle at top right, #ff2222, #3a0000); }
            50% { background: radial-gradient(circle at top right, #990000, #150000); }
            100% { background: radial-gradient(circle at top right, #ff2222, #3a0000); }
        }

        body {
            margin: 0;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 8rem;
            animation: cambiarFondoRojo 8s ease-in-out infinite;
        }

        /* Contenedor Principal de Proyectos */
        .proyectos-contenedor {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-w: 72rem;
            width: 100%;
            box-sizing: border-box;
        }

        /* Grid para organizar las tarjetas de dos en dos */
        .proyectos-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            width: 100%;
            max-w: 58rem;
            margin-top: 1.5rem;
        }

        @media (min-width: 768px) {
            .proyectos-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Tarjeta de Proyecto (Efecto Glassmorphism) */
        .tarjeta-proyecto {
            display: flex;
            flex-direction: column;
            background-color: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .img-contenedor {
            display: flex;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .proyecto-logo {
            width: 120px;
            height: 120px;
            border-radius: 2.5rem;
            transition: transform 0.2s ease;
        }
        .proyecto-logo:hover {
            transform: scale(1.05);
        }

        .info-proyecto {
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            text-align: left;
            flex-grow: 1;
        }

        .proyecto-titulo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            width: fit-content;
        }

        .proyecto-desc {
            color: #a3a3a3;
            margin: 0.25rem 0 0 0;
            font-size: 0.95rem;
        }

        /* Etiquetas del Proyecto */
        .tags-contenedor {
            padding-top: 1.25rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background-color: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            color: #ffffff;
            font-weight: 700;
            border-radius: 0.75rem;
            text-transform: uppercase;
        }
        
        .tag-head-dev {
            background-color: rgba(220, 38, 38, 0.8);
            border: 1px solid rgba(255, 100, 100, 0.3);
        }

        /* Barra Flotante Inferior */
        .nav-contenedor {
            position: fixed;
            bottom: 1.5rem;
            z-index: 10;
            display: flex;
            width: 100%;
            justify-content: center;
            pointer-events: none;
        }
        
        .nav-bar {
            display: flex;
            flex-direction: row;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            padding: 0.625rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(20, 15, 15, 0.5);
            backdrop-filter: blur(64px);
            -webkit-backdrop-filter: blur(64px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        .nav-btn {
            font-size: 1.5rem;
            margin: 0.125rem;
            padding: 0.625rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            background-color: transparent;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }
        .nav-btn-active { background-color: #b91c1c; }
    </style>
</head>
<body>

    <div class="proyectos-contenedor">
        <h1 style="font-size: 2rem; font-weight: bold; margin-bottom: 0.5rem;">Mis Proyectos</h1>
        
        <div class="proyectos-grid">
            
            <!-- MineLuck -->
            <section class="tarjeta-proyecto">
                <div class="img-contenedor">
                    <img alt="Logo de MineLuck" class="proyecto-logo" src="mineluck.png" onerror="this.src='https://placehold.co'"/>
                </div>
                <div class="info-proyecto">
                    <span class="proyecto-titulo">MineLuck</span>
                    <p class="proyecto-desc">Es un servidor de modalidades boxpvps.</p>
                </div>
                <div class="tags-contenedor">
                    <div class="tag">Dev</div>
                    <div class="tag">Admin</div>
                </div>
            </section>

            <!-- HydroxMC -->
            <section class="tarjeta-proyecto">
                <div class="img-contenedor">
                    <img alt="Logo de HydroxMC" class="proyecto-logo" src="hydroxmc.png" onerror="this.src='https://placehold.co'"/>
                </div>
                <div class="info-proyecto">
                    <span class="proyecto-titulo">HydroxMC</span>
                    <p class="proyecto-desc">Es un servidor de modalidades boxpvps.</p>
                </div>
                <div class="tags-contenedor">
                    <div class="tag tag-head-dev">Head-Dev</div>
                </div>
            </section>

            <!-- LaJerarquia -->
            <section class="tarjeta-proyecto">
                <div class="img-contenedor">
                    <img alt="Logo de LaJerarquia" class="proyecto-logo" src="lajerarquia.png" onerror="this.src='https://placehold.co'"/>
                </div>
                <div class="info-proyecto">
                    <span class="proyecto-titulo">LaJerarquia</span>
                    <p class="proyecto-desc">Es un servidor de modalidades survival.</p>
                </div>
                <div class="tags-contenedor">
                    <div class="tag">Dev</div>
                    <div class="tag">Admin</div>
                </div>
            </section>

            <!-- Portafolio Personal -->
            <section class="tarjeta-proyecto">
                <div class="img-contenedor">
                    <img alt="Logo de Portafolio Personal" class="proyecto-logo" src="logo.png" onerror="this.src='https://placehold.co'"/>
                </div>
                <div class="info-proyecto">
                    <a class="proyecto-titulo" href="index.html">Portafolio Personal</a>
                    <!-- Sin descripción (lore) -->
                </div>
                <div class="tags-contenedor">
                    <div class="tag">Creator</div>
                    <div class="tag">Frontend</div>
                </div>
            </section>

        </div>
    </div>

    <!-- Barra de Navegación Flotante Minimalista -->
    <div class="nav-contenedor">
        <nav class="nav-bar">
            <a aria-label="Inicio" href="index.html" class="nav-btn">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://w3.org">
                    <path fill="none" d="M0 0h24v24H0z"></path>
                    <path d="M12 3 4 9v12h5v-7h6v7h5V9z"></path>
                </svg>
            </a>
            <a aria-label="Proyectos" href="projects.html" class="nav-btn nav-btn-active">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="1em" width="1em" xmlns="http://w3.org">
                    <path d="M0 1a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1zm9 0a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1V1zm0 9a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1v-5z"></path>
                </svg>
            </a>
        </nav>
    </div>

</body>
</html>
